name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: scripts/make-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Publish release with DMG
        env:
          GH_TOKEN: ${{ github.token }}
          DMG: dist/DeskPetMac-${{ steps.version.outputs.version }}.dmg
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${DMG}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${DMG}" \
              --title "DeskPetMac ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
